<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel='shortcut icon' type='image/jpg' href='/assets/favicon.ico'/>
<title>KP Radio - Listen</title>
<meta name="description" content="KP Radio - Tune in, Space Out. 24/7 handpicked music from the Possum Den.">
<link href="/css/fontMapping.css" rel="stylesheet" type="text/css" media="all">
<link href="/css/effects.css" rel="stylesheet" type="text/css" media="all">
<link href="/css/base.css" rel="stylesheet" type="text/css" media="all">
<link href="/css/calendar.css" rel="stylesheet" type="text/css" media="all">
<link href="/css/listen.css" rel="stylesheet" type="text/css" media="all">
</head>

<script data-site="RRZKQSF" src="https://analytics.kingposs.com/script.js" defer></script>
<script src="/JS/possradio.js"></script>

<body>

<main class="listen-main">

<div class="kpr-radio">
  <div class="kpr-radio-header">
    <div class="kpr-radio-label">KP Radio</div>
    <div class="kpr-status-group">
      <span id="broadcast-status" class="kpr-status-label">Auto-DJ</span>
      <span class="kpr-status-dot"></span>
    </div>
  </div>
  <script src="/JS/possradio.js"></script>
  <script>
  KPR.insert({
    url: 'https://radio.kingposs.com/radio.mp3',
    codec: 'mp3',
    volume: 40,
    width: 320,
    height: 115,
    title: 'KPradio.net',
    metadataStation: 'kpradio',
    metadataDisplay: 'on-play',
    
    nowPlayingUI: {
      liveText: '#broadcast-status',
      liveTextOn: 'LIVE!',
      liveTextOff: 'Auto-DJ'
    },
    skin: {
      html: [
        '<div class="kpr-face">',
        '  <div class="kpr-display-area">',
        '    <div data-kpr="text" class="kpr-marquee"></div>',
        '    <div class="kpr-grille"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>',
        '  </div>',
        '  <div class="kpr-knobs">',
        '    <div class="kpr-knob-group">',
        '      <div data-kpr="volume" data-kpr-dial class="kpr-vol-track">',
        '        <div data-kpr="volume-holder" class="kpr-vol-knob"></div>',
        '      </div>',
        '      <span class="kpr-knob-label">VOL</span>',
        '    </div>',
        '    <button data-kpr="toggle" class="kpr-btn">&#9654;</button>',
        '  </div>',
        '</div>'
      ].join('\n'),
      css: '/* no-scope */'
    }
  });
  </script>
</div>

<div class="kpr-radio kpr-chrome">
  <div class="kpr-antenna"></div>
  <div class="kpr-radio-header">
    <div class="kpr-radio-label">KP Radio</div>
    <div class="kpr-status-group">
      <span id="broadcast-status-2" class="kpr-status-label">Auto-DJ</span>
      <span class="kpr-status-dot"></span>
    </div>
  </div>
  <script>
  KPR.insert({
    url: 'https://radio.kingposs.com/radio.mp3',
    codec: 'mp3',
    volume: 40,
    width: 320,
    height: 140,
    title: 'KPradio.net',
    metadataStation: 'kpradio',
    metadataDisplay: 'on-play',

    nowPlayingUI: {
      liveText: '#broadcast-status-2',
      liveTextOn: 'LIVE!',
      liveTextOff: 'Auto-DJ'
    },
    skin: {
      html: [
        '<div class="chr-body">',
        '  <div class="chr-left">',
        '    <div data-kpr="text" class="kpr-marquee"></div>',
        '    <div class="chr-grille">',
        '      <span></span><span></span><span></span><span></span><span></span>',
        '      <span></span><span></span><span></span><span></span><span></span>',
        '    </div>',
        '  </div>',
        '  <div class="chr-right">',
        '    <div class="chr-dial"></div>',
        '    <div class="chr-transport">',
        '      <button data-kpr="toggle" class="chr-btn">&#9654;</button>',
        '    </div>',
        '  </div>',
        '</div>',
        '<div class="chr-vol-row">',
        '  <span class="chr-vol-label">VOL</span>',
        '  <div data-kpr="volume" class="chr-vol-track">',
        '    <div data-kpr="volume-holder" class="chr-vol-knob"></div>',
        '  </div>',
        '</div>'
      ].join('\n'),
      css: '/* no-scope */'
    }
  });
  </script>
</div>

<hr>

<!-- Calendar (agenda view forced) -->
<div class="cal-window" id="calWidget">
  <div class="cal-body">
    <div class="cal-nav">
      <button class="btn-95" onclick="changeMonth(-1)">&lt; Prev</button>
      <div class="month-label" id="monthLabel">Loading...</div>
      <button class="btn-95" onclick="changeMonth(1)">Next &gt;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-agenda" id="calAgenda"></div>
  </div>
</div>

<div class="event-popup-overlay" id="popupOverlay" onclick="closePopup(event)">
  <div class="cal-window event-popup" onclick="event.stopPropagation()">
    <div class="cal-titlebar">
      <span class="title-text"><span id="popupTitle">Events</span></span>
    </div>
    <div class="cal-body" id="popupBody"></div>
  </div>
</div>

<div class="listen-link">
  <a href="/radio.html">Full Radio Page</a>
</div>
<iframe src="https://radio.kingposs.com/public/kpradio/embed?theme=dark" frameborder="0" allowtransparency="true" style="width: 100%; min-height: 150px; border: 0;"></iframe>
</main>

<script src="/JS/ical.min.js"></script>
<script src="/JS/calendar.js"></script>

</body>

</html>
